<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Document</title>
        <link rel="stylesheet" href="styleindex.css">
    <link rel="stylesheet" href="addfood.css">
    <link rel="stylesheet" href="header-footer.css">
    <link rel="stylesheet" href="quanlymonan.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Ăn là ghiền - Mua là mê</span>
            <div class="social-icons">
                <a href="#"><img src="image/facebook.png" alt="Facebook"></a>
                <a href="#"><img src="image/instagram.png" alt="Instagram"></a>
                <a href="#"><img src="image/tiktok.png" alt="Tiktok"></a>
            </div>
        </div>

        <div class = "logo-container">
            <div class = "admin-logo">
                <a href ="index.html"><img src="image/Fauget.png" alt="Fauget Logo"></a>
            </div>

            <div class="admin-container">
                <div class="icon-user">
                    <img src="image2/administrator.png" alt="Hello">
                </div>
                <span>Xin chào</span>
            </div>
        </div>
        
        
        <nav class="main-nav">
            <div class="container nav-flex">
                <ul>
                    <li><a href="tongquan.html" class="active">TỔNG QUAN</a></li>
                    <li><a href="quanlydonhang.html">QUẢN LÝ ĐƠN HÀNG</a></li>
                    <li><a href="quanlymonan.html">QUẢN LÝ MÓN ĂN</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="addfood-title">
        <img src="image2/schedule.png" alt="title">
        <h2>THÊM/SỬA MÓN ĂN</h2>
    </div>

        <div class="popup-form">

            <div class="form-group">
                <label>TÊN MÓN ĂN</label>
                <input type="text" id="tenMon" placeholder="">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>DANH MỤC</label>
                    <input type="text" id="danhMuc" placeholder="">
                </div>
                <div class="form-group">
                    <label>GIÁ BÁN</label>
                    <input type="text" id="giaBan" placeholder="">
                </div>
            </div>

            <div class="form-group">
                <label>MÔ TẢ MÓN ĂN</label>
                <input type="text" id="moTa" placeholder="">
            </div>

            <div class="form-group">
                <label>HÌNH ẢNH ĐẠI DIỆN</label>
                <div class="upload-row">
                    <label class="btn-chon-file">
                        CHỌN
                        <input type="file" id="hinhAnh" accept="image/*" hidden>
                    </label>
                    <span id="fileName">bấm để tải ảnh lên...</span>
                </div>
            </div>

            <div class="form-group">
                <label>TRẠNG THÁI</label>
                <div class="status-row">
                    <label class="status-option">
                        <input type="radio" name="trangThai" value="Còn hàng">
                        <span class="status-btn green">CHỌN</span>
                        Đang bán
                    </label>
                    <label class="status-option">
                        <input type="radio" name="trangThai" value="Hết hàng">
                        <span class="status-btn red">CHỌN</span>
                        Ngưng bán
                    </label>
                </div>
            </div>

            <div class="popup-actions">
                <button class="btn-huy" onclick="dongPopup()">HỦY BỎ</button>
                <button class="btn-luu" onclick="luuMonAn()">LƯU DỮ LIỆU</button>
            </div>

        </div>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <img src="image/Fauget.png" alt="Fauget Logo">
                <p>Đồ ăn nhanh chất lượng, giao hàng tận nơi.</p>
            </div>
            <div class="footer-contact">
                <h4>
                    Liên hệ
                </h4>
                <p><i class="fas fa-map-marker-alt"></i> 123 Đường ABC, Hà Đông, TP.Hà Nội</p>
                <p><i class="fas fa-phone"></i> 0123 456 789</p>
                <p><i class="fas fa-envelope"></i> hello@fastfood.com</p>
            </div>
            <div class="footer-hours">
                <h4>Giờ mở cửa</h4>
                <p>Thứ Hai - Chủ Nhật</p>
                <p>9:00 - 22:00</p>
            </div>
        </div>
    </footer>

<script>

let editIndex = null;

/* HIỂN THỊ TÊN FILE ẢNH */
document.getElementById('hinhAnh').addEventListener('change', function () {
    var file = this.files[0];

    if (file) {
        document.getElementById('fileName').textContent = file.name;

        const reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('fileName').dataset.img = e.target.result;
        };
        reader.readAsDataURL(file);
    } else {
        document.getElementById('fileName').textContent = 'bấm để tải ảnh lên...';
    }
});


/* KIỂM TRA CHẾ ĐỘ SỬA */
const params = new URLSearchParams(window.location.search);
const index = params.get("index");

if (index !== null) {

    let foods = JSON.parse(localStorage.getItem('foods') || '[]');
    let food = foods[index];

    if (food) {
        document.getElementById('tenMon').value = food.name;
        document.getElementById('giaBan').value = food.price;

        document.querySelectorAll('input[name="trangThai"]').forEach(radio=>{
            if(radio.value === food.status){
                radio.checked = true;
            }
        });

        editIndex = index;
    }
}


/* LƯU MÓN ĂN */
function luuMonAn() {

    var ten = document.getElementById('tenMon').value.trim();
    var gia = document.getElementById('giaBan').value.trim();
    var status = document.querySelector('input[name="trangThai"]:checked');
    var img = document.getElementById('fileName').dataset.img || 'image/default.jpg';

    if (!ten || !gia || !status) {
        alert('Vui lòng điền đầy đủ thông tin!');
        return;
    }

    var foods = JSON.parse(localStorage.getItem('foods') || '[]');

    var foodData = {
        img: img,
        name: ten,
        price: gia,
        status: status.value
    };

    if (editIndex !== null) {
        foods[editIndex] = foodData;
    } else {
        foods.push(foodData);
    }

    localStorage.setItem('foods', JSON.stringify(foods));

    alert("Lưu món ăn thành công!");

    window.location.href = "quanlymonan.html";
}

</script>
    
</body>
</html>

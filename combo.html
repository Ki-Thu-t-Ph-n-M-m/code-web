<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styleindex.css">
    <link rel="stylesheet" href="stylecombo.css"
    <title>Combo</title>
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Ăn là ghiền - Mua là mê</span>
            <div class="social-icons">
                <a href="#"><img src="image/facebook.png" alt="Facebook"></a>
                <a href="#"><img src="image/instagram.png" alt="Instagram"></a>
                <a href="#"><img src="image/tiktok.png" alt="Tiktok"></a>
            </div>
        </div>

        <div class = "mid-header container">
            <div class = "logo">
                <a href = "image/Fauget.png" alt="Fauget Logo"></a>
            </div>
            <div class = "search-bar">
                <input type="text" placeholder="Tìm kiếm...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div>
                <a href="login.html" class="btn-login">Đăng nhập</a>
                <a href="register.html" class="btn-register">Đăng ký</a>
            </div>
        </div>
        <nav class="main-nav">
            <div class="container nav-flex">
                <ul>
                    <li><a href="index.html" class="active">Trang chủ</a></li>
                    <li><a href="menu.html">MENU</a></li>
                    <li><a href="combo.html">COMBO</a></li>
                    <li><a href="about.html">GIỚI THIỆU</a></li>
                    <li><a href="contact.html">LIÊN HỆ</a></li>
                </ul>
                <div class="cart-icon">
                    <a href="cart.html"><img src="image/cart.png" alt="Giỏ hàng"><i class ="fas fa-shopping-cart"></i></a>
                </div>
            </div>
        </nav>
    </header>
    <section class="banner">
        <img src="image/combo.jpg" alt="Combo siêu giảm giá" class="combo">
        <img src="image/combo2.png" alt="Combo đại giảm giá" class="combo1">
    </section>






    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <img src="image/Fauget.png" alt="Fauget Logo">
                <p>Đồ ăn nhanh chất lượng, giao hàng tận nơi.</p>
            </div>
            <div class="footer-contact">
                <h4>
                    Liên hệ
                </h4>
                <p><i class="fas fa-map-marker-alt"></i> 123 Đường ABC, Hà Đông, TP.Hà Nội</p>
                <p><i class="fas fa-phone"></i> 0123 456 789</p>
                <p><i class="fas fa-envelope"></i> hello@fastfood.com</p>
            </div>
            <div class="footer-hours">
                <h4>Giờ mở cửa</h4>
                <p>Thứ Hai - Chủ Nhật</p>
                <p>9:00 - 22:00</p>
            </div>
        </div>
    </footer>

<script>

const addBtns = document.querySelectorAll(".add-btn");

addBtns.forEach(btn => {

btn.addEventListener("click", function(){

const card = this.closest(".product-card");

const name = card.querySelector("h3").innerText;
const price = card.querySelector(".price").innerText;
const img = card.querySelector("img").src;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const exist = cart.find(item => item.name === name);

if(exist){
exist.quantity++;
}else{

cart.push({
name:name,
price:price,
img:img,
quantity:1
});

}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Đã thêm vào giỏ hàng!");

});

});

</script>
    
</body>
</html>
